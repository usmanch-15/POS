name: pos
description: StockPro — Professional POS & Inventory Management
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # Fonts & Icons
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  uuid: ^4.5.1

  # PDF / Print
  pdf: ^3.11.1
  printing: ^5.13.2

  # Barcode
  flutter_barcode_scanner: ^2.0.0
  mobile_scanner: ^5.2.3

  # ← ADDED: 3 missing packages
  package_info_plus: ^8.1.2      # app_info.dart ke liye
  share_plus: ^10.1.4            # printer_service ke liye
  connectivity_plus: ^6.1.1      # offline_banner ke liye

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/