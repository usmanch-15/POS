name: stock_pro
description: "StockPro - Smart Inventory Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── Local Storage ─────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.20.2
  equatable: ^2.0.5

  # ── Firebase Core ─────────────────────────────────────────
  firebase_core: ^4.9.0

  # ── Firebase Auth ─────────────────────────────────────────
  firebase_auth: ^6.5.1

  # ── Firebase Firestore ────────────────────────────────────
  cloud_firestore: ^6.4.1

  # ── Firebase Storage ──────────────────────────────────────
  firebase_storage: ^13.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true